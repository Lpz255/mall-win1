server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
      force-request: true
      force-response: true

spring:
  application:
    name: demo
  profiles:
    active: dev
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/mall_demo?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-test-query: SELECT 1

  data:
    redis:
      client-type: lettuce
      host: localhost
      port: 6379
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 200
          max-idle: 50
          min-idle: 10
          max-wait: 1000ms

  rabbitmq:
    host: localhost
    port: 5672
    publisher-confirm-type: correlated
    publisher-returns: true
    dynamic: false
    listener:
      simple:
        auto-startup: false
        max-concurrency: 50
        prefetch: 10
        acknowledge-mode: manual
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
    template:
      mandatory: true

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

product:
  cache:
    detail-expire-seconds: 3600
    hot-expire-seconds: 1800
    null-expire-seconds: 120
    ttl-random-max-seconds: 300
    lock-expire-seconds: 10
    lock-retry-times: 5
    lock-retry-interval-millis: 20
    hot-product-ids: [1001, 1002, 1003]

seckill:
  permits-per-second: 2000
  acquire-timeout-millis: 50
  stock-cache-key-prefix: "seckill:stock:"
  stock-init-lock-key-prefix: "seckill:stock:init:lock:"
  user-order-key-prefix: "seckill:user:order:"
  message-max-retry-times: 3

order:
  expire-minutes: 30
  delay-cancel-millis: 1800000

auth:
  user-session:
    token-key-prefix: "auth:user:token:"
    user-index-key-prefix: "auth:user:index:"
    ttl-seconds: 604800

storage:
  minio:
    endpoint: http://127.0.0.1:9000
    public-endpoint: http://127.0.0.1:9000
    access-key: minioadmin
    secret-key: minioadmin
    bucket: mall-demo
    product-image-dir: product
    max-image-size-mb: 5
    auto-create-bucket: true
    auto-set-public-read: true

logging:
  level:
    root: INFO

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    root: WARN
